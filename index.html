<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusEat - Vraie App Firebase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none; }
        .notif-enter { transform: translateY(0); opacity: 1; }
        .notif-leave { transform: translateY(-150%); opacity: 0; }
    </style>
</head>
<body class="bg-gray-200 font-sans antialiased text-gray-800 flex justify-center">

    <div class="w-full max-w-md bg-gray-50 h-screen flex flex-col shadow-2xl relative overflow-hidden">
        
        <!-- BANNIÈRE NOTIFICATION -->
        <div id="notification-banner" class="absolute top-4 left-4 right-4 bg-white rounded-2xl shadow-2xl p-4 z-50 flex items-center gap-3 border-l-4 border-orange-500 transition-all duration-500 notif-leave">
            <div class="bg-orange-100 p-2 rounded-full"><i class="fa-solid fa-bell text-orange-600 text-xl"></i></div>
            <div>
                <p class="font-bold text-sm text-gray-800">CampusEat</p>
                <p class="text-xs text-gray-600 font-medium" id="notif-text">Texte</p>
            </div>
        </div>

        <!-- HEADER -->
        <header class="bg-orange-600 text-white p-5 rounded-b-3xl shadow-md z-10 flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-rocket"></i> CampusEat</h1>
            <div class="flex gap-2">
                <button onclick="window.switchRole('resto')" class="text-xs bg-black bg-opacity-20 px-2 py-1 rounded">👨‍🍳 Resto</button>
                <button onclick="window.switchRole('student')" class="text-xs bg-black bg-opacity-20 px-2 py-1 rounded">👨‍🎓 Étudiant</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-5 pb-24">
            <!-- PAGE : FILE D'ATTENTE -->
            <div id="page-queue" class="block space-y-6">
                
                <!-- VUE ÉTUDIANT -->
                <div id="view-student">
                    <!-- Status de connexion Firebase -->
                    <div id="connection-status" class="text-center text-xs text-gray-400 mb-2 font-mono">
                        🔴 Connexion au serveur en cours...
                    </div>

                    <div class="bg-white border border-gray-100 rounded-2xl p-5 text-center shadow-sm">
                        <p class="text-gray-500 text-sm font-medium uppercase">Numéro au guichet</p>
                        <p id="student-current-serving" class="text-6xl font-black text-orange-600 mt-2">-</p>
                        <p class="text-xs mt-3 text-gray-400"><span id="student-queue-length">0</span> personne(s) en attente</p>
                    </div>

                    <div id="ticket-action-zone" class="mt-6">
                        <button onclick="window.takeTicket()" class="w-full bg-orange-600 text-white font-bold py-4 rounded-xl text-lg shadow-lg active:scale-95 transition">
                            <i class="fa-solid fa-ticket"></i> Prendre un ticket
                        </button>
                    </div>

                    <div id="my-ticket-zone" class="hidden mt-6 border-2 border-orange-500 bg-orange-50 rounded-2xl p-6 text-center">
                        <p class="text-gray-600 font-medium">Ton numéro :</p>
                        <p id="my-ticket-number" class="text-7xl font-black text-orange-600 my-2">#0</p>
                        
                        <div id="waiting-status" class="mt-4">
                            <p class="font-bold text-gray-800"><span id="people-before-me" class="text-orange-600 text-xl">0</span> avant toi.</p>
                        </div>
                        <div id="ready-status" class="hidden mt-4 p-4 bg-green-500 text-white rounded-xl shadow-md animate-pulse">
                            <p class="font-bold text-xl">C'EST TON TOUR ! 🍽️</p>
                        </div>

                        <!-- Nouveau bouton pour libérer le ticket -->
                        <button onclick="window.clearTicket()" class="mt-6 text-xs text-gray-500 underline hover:text-red-500">
                            Annuler mon ticket / J'ai mon plat
                        </button>
                    </div>
                </div>

                <!-- VUE CANTINE -->
                <div id="view-resto" class="hidden bg-gray-800 rounded-2xl p-6 text-center text-white shadow-xl">
                    <p class="text-orange-400 font-bold mb-4">PANEL SERVICE</p>
                    <p class="text-gray-400 text-sm">Numéro actuel</p>
                    <p id="resto-current-serving" class="text-7xl font-black mt-2">-</p>
                    <p class="mb-6 mt-4 text-orange-300 font-medium"><span id="resto-queue-length">0</span> en attente</p>
                    <button onclick="window.callNext()" class="w-full bg-green-500 text-white font-bold py-4 rounded-xl text-lg active:scale-95">APPELER LE SUIVANT</button>
                    
                    <button onclick="window.resetQueue()" class="mt-6 text-xs text-red-400 border border-red-400 px-3 py-1 rounded">
                        ⚠️ Remettre la file à zéro
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- ========================================== -->
    <!-- 🔥 LE VRAI MOTEUR FIREBASE                 -->
    <!-- ========================================== -->
    <script type="module">
        // Import depuis le CDN pour que ça marche direct en HTML
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // TA CONFIGURATION (Sécurisée par Firebase via ton authDomain)
        const firebaseConfig = {
            apiKey: "AIzaSyCCYz11kL3ATDZ9qrKm7ZV0ztggMO_cutE",
            authDomain: "campuseat-cdede.firebaseapp.com",
            projectId: "campuseat-cdede",
            databaseURL: "https://campuseat-cdede-default-rtdb.firebaseio.com", // Ajout de l'URL par défaut
            storageBucket: "campuseat-cdede.firebasestorage.app",
            messagingSenderId: "585809761889",
            appId: "1:585809761889:web:601dd7003f04685da17c20",
            measurementId: "G-LGP91HSG5R"
        };

        // Initialisation
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const queueRef = ref(db, 'queue');

        let lastTicket = 0;
        let currentServing = 0;
        
        // RECUPERATION DU TICKET SAUVEGARDÉ (Persistance locale)
        let myTicket = localStorage.getItem('campusEat_myTicket');
        if(myTicket) myTicket = parseInt(myTicket);

        // 🟢 ÉCOUTE EN TEMPS RÉEL
        onValue(queueRef, (snapshot) => {
            const data = snapshot.val();
            document.getElementById('connection-status').innerText = "🟢 Connecté en direct";
            document.getElementById('connection-status').classList.replace('text-gray-400', 'text-green-500');

            if (!data) {
                // Si la base est vide, on la crée avec 0
                set(queueRef, { lastTicket: 0, currentServing: 0 });
                return;
            }

            lastTicket = data.lastTicket || 0;
            currentServing = data.currentServing || 0;
            updateUI();
        });

        // 👨‍🎓 PRENDRE UN TICKET
        window.takeTicket = function() {
            const lastTicketRef = ref(db, 'queue/lastTicket');
            
            // Transaction : empêche 2 étudiants d'avoir le même numéro
            runTransaction(lastTicketRef, (currentValue) => {
                return (currentValue || 0) + 1;
            }).then((result) => {
                if (result.committed) {
                    myTicket = result.snapshot.val();
                    // SAUVEGARDE DANS LE TÉLÉPHONE
                    localStorage.setItem('campusEat_myTicket', myTicket);
                    updateUI();
                    window.showNotification("🎟️ Ton ticket #" + myTicket + " est validé !");
                }
            });
        };

        // 👨‍🍳 APPELER LE SUIVANT
        window.callNext = function() {
            if (currentServing < lastTicket) {
                set(ref(db, 'queue/currentServing'), currentServing + 1);
            }
        };

        // 👨‍🍳 REMETTRE À ZERO (Fin de journée)
        window.resetQueue = function() {
            if(confirm("Sûr de vouloir vider la file ?")) {
                set(ref(db, 'queue'), { lastTicket: 0, currentServing: 0 });
            }
        }

        // 🗑️ ANNULER LE TICKET
        window.clearTicket = function() {
            localStorage.removeItem('campusEat_myTicket');
            myTicket = null;
            document.getElementById('ticket-action-zone').classList.remove('hidden');
            document.getElementById('my-ticket-zone').classList.add('hidden');
        }

        // 🎨 MISE À JOUR VISUELLE
        function updateUI() {
            let qLen = lastTicket - currentServing;
            if(qLen < 0) qLen = 0;

            document.getElementById('student-current-serving').innerText = currentServing;
            document.getElementById('resto-current-serving').innerText = currentServing;
            document.getElementById('student-queue-length').innerText = qLen;
            document.getElementById('resto-queue-length').innerText = qLen;

            // Si j'ai un ticket
            if (myTicket) {
                document.getElementById('ticket-action-zone').classList.add('hidden');
                document.getElementById('my-ticket-zone').classList.remove('hidden');
                document.getElementById('my-ticket-number').innerText = "#" + myTicket;

                let pos = myTicket - currentServing;
                if (pos <= 0) {
                    document.getElementById('waiting-status').classList.add('hidden');
                    document.getElementById('ready-status').classList.remove('hidden');
                } else {
                    document.getElementById('waiting-status').classList.remove('hidden');
                    document.getElementById('ready-status').classList.add('hidden');
                    document.getElementById('people-before-me').innerText = pos;
                }
            }
        }

        window.switchRole = function(role) {
            const stu = document.getElementById('view-student'), res = document.getElementById('view-resto');
            if(role === 'student') { stu.classList.remove('hidden'); res.classList.add('hidden'); } 
            else { res.classList.remove('hidden'); stu.classList.add('hidden'); }
        };

        window.showNotification = function(message) {
            const banner = document.getElementById('notification-banner');
            document.getElementById('notif-text').innerText = message;
            banner.classList.remove('notif-leave'); banner.classList.add('notif-enter');
            setTimeout(() => { banner.classList.remove('notif-enter'); banner.classList.add('notif-leave'); }, 4000);
        };
    </script>
</body>
</html>
